<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:25px;
border-radius:10px;
width:260px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h3>Admin Login</h3>

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let pass=document.getElementById("password").value.trim();

if(pass==="1234"){

localStorage.setItem("admin","true");

window.location.href="admin.html";

}else{

alert("Wrong Password");

}

}

</script>

</body>
</html>
