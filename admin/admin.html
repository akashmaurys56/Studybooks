<!DOCTYPE html>
<html>

<head>

<title>StudyBooks Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../firebase.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.header{
background:#4CAF50;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.formBox{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.close{
background:#f44336;
margin-top:8px;
}

</style>

</head>

<body>

<div class="header">
StudyBooks Admin Panel
</div>

<div class="container">

<div class="card" onclick="openForm('section')">➕ Add Section</div>

<div class="card" onclick="openForm('class')">📚 Add Class</div>

<div class="card" onclick="openForm('subject')">📖 Add Subject</div>

<div class="card" onclick="openForm('chapter')">📄 Add Chapter</div>

</div>


<div class="modal" id="modal">

<div class="formBox" id="formContent"></div>

</div>


<script>

var db = firebase.firestore();


function openForm(type){

let html="";

if(type==="section"){

html=`

<h3>Add Section</h3>

<input id="sectionName" placeholder="Section Name">

<button onclick="addSection()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

}

if(type==="class"){

html=`

<h3>Add Class</h3>

<input id="classSection" placeholder="Section Name">

<input id="className" placeholder="Class Name">

<button onclick="addClass()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

}

if(type==="subject"){

html=`

<h3>Add Subject</h3>

<input id="subjectSection" placeholder="Section Name">

<input id="subjectClass" placeholder="Class Name">

<input id="subjectName" placeholder="Subject Name">

<button onclick="addSubject()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

}

if(type==="chapter"){

html=`

<h3>Add Chapter</h3>

<input id="chapterSection" placeholder="Section Name">

<input id="chapterClass" placeholder="Class Name">

<input id="chapterSubject" placeholder="Subject Name">

<input id="chapterName" placeholder="Chapter Name">

<button onclick="addChapter()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

}

document.getElementById("formContent").innerHTML=html;

document.getElementById("modal").style.display="flex";

}


function closeForm(){

document.getElementById("modal").style.display="none";

}



function addSection(){

let name=document.getElementById("sectionName").value;

db.collection("sections").add({name:name});

alert("Section Added");

closeForm();

}



function addClass(){

let section=document.getElementById("classSection").value;

let name=document.getElementById("className").value;

db.collection("classes").add({

section:section,

name:name

});

alert("Class Added");

closeForm();

}



function addSubject(){

let section=document.getElementById("subjectSection").value;

let className=document.getElementById("subjectClass").value;

let name=document.getElementById("subjectName").value;

db.collection("subjects").add({

section:section,

class:className,

name:name

});

alert("Subject Added");

closeForm();

}



function addChapter(){

let section=document.getElementById("chapterSection").value;

let className=document.getElementById("chapterClass").value;

let subject=document.getElementById("chapterSubject").value;

let chapter=document.getElementById("chapterName").value;

db.collection("chapters").add({

section:section,

class:className,

subject:subject,

name:chapter

});

alert("Chapter Added");

closeForm();

}

</script>

</body>

</html>
