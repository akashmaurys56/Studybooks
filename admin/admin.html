<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div class="container">
        <nav class="sidebar">
            <h2>Admin Logo</h2>
            <ul>
                <li><a href="#" onclick="showSection('dashboard')">Dashboard</a></li>
                <li><a href="#" onclick="showSection('users')">Users</a></li>
                <li><a href="#" onclick="showSection('settings')">Settings</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header>
                <h1 id="page-title">Dashboard</h1>
                <button id="logout-btn">Logout</button>
            </header>

            <section class="stats">
                <div class="card"><h3>Total Users</h3> <p id="user-count">120</p></div>
                <div class="card"><h3>Revenue</h3> <p>$5,000</p></div>
                <div class="card"><h3>Active Tasks</h3> <p>15</p></div>
            </section>

            <section class="data-section">
                <h3>Recent Activities</h3>
                <table id="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
