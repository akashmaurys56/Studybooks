<!DOCTYPE html><html>
<head><title>StudyBooks Admin Panel</title><link rel="stylesheet" href="admin.css"><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script><script src="../firebase.js"></script></head><body><script>

if(localStorage.getItem("admin")!=="true"){
window.location.href="admin-login.html";
}

</script><div class="header">StudyBooks Admin Panel

<button onclick="logout()">Logout</button>

</div><div class="cards"><div class="card" onclick="addSection()">Add Section</div><div class="card" onclick="addClass()">Add Class</div><div class="card" onclick="addSubject()">Add Subject</div><div class="card" onclick="addChapter()">Add Chapter</div></div><script src="admin.js"></script>
<div id="sectionPopup" class="popup">
  <div class="popup-box">
    <h3>Add Section</h3><input id="sectionInput" placeholder="Section Name">

<div class="popup-buttons">
  <button onclick="saveSection()">Save</button>
  <button onclick="closeAllPopups()">Cancel</button>
</div>

  </div>
</div><div id="classPopup" class="popup">
  <div class="popup-box">
    <h3>Add Class</h3><select id="classSectionSelect"></select>

<input id="classInput" placeholder="Class Name">

<div class="popup-buttons">
  <button onclick="saveClass()">Save</button>
  <button onclick="closeAllPopups()">Cancel</button>
</div>

  </div>
</div><div id="subjectPopup" class="popup">
  <div class="popup-box">
    <h3>Add Subject</h3><select id="subjectSectionSelect" onchange="loadClasses(this.value,'subjectClassSelect')"></select>

<select id="subjectClassSelect"></select>

<input id="subjectInput" placeholder="Subject Name">

<div class="popup-buttons">
  <button onclick="saveSubject()">Save</button>
  <button onclick="closeAllPopups()">Cancel</button>
</div>

  </div>
</div><div id="chapterPopup" class="popup">
  <div class="popup-box">
    <h3>Add Chapter</h3><select id="chapterSectionSelect" onchange="loadClasses(this.value,'chapterClassSelect')"></select>

<select id="chapterClassSelect" onchange="loadSubjects(this.value,'chapterSubjectSelect')"></select>

<select id="chapterSubjectSelect"></select>
<input id="chapterInput" placeholder="Chapter Name">

<div class="popup-buttons">
  <button onclick="saveChapter()">Save</button>
  <button onclick="closeAllPopups()">Cancel</button>
</div>

  </div>
</div>
</body>
</html>
