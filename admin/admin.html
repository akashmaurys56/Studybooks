<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#4CAF50;
color:white;
padding:15px;
font-size:22px;
}

.card{
background:white;
padding:15px;
margin:10px;
border-radius:8px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

#content{
padding:10px;
}

.item{
background:white;
padding:10px;
margin:5px;
border-radius:6px;
display:flex;
justify-content:space-between;
}

button{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:4px;
}

</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../firebase.js"></script>

</head>

<body>

<div class="header">
StudyBooks Admin
</div>

<div class="card" onclick="addSection()">
Add Section
</div>

<div class="card" onclick="showSections()">
Manage Sections
</div>

<div id="content"></div>

<script src="admin.js"></script>

</body>

</html>
