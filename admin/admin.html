<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../firebase.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#4CAF50;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:20px;
}

button{
display:block;
width:100%;
padding:15px;
margin:10px 0;
font-size:18px;
border:none;
background:#2196F3;
color:white;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
StudyBooks Admin Panel
</div>

<div class="container">

<button onclick="addSection()">Add Section</button>

<button onclick="addClass()">Add Class</button>

<button onclick="addSubject()">Add Subject</button>

<button onclick="addChapter()">Add Chapter</button>

</div>

<script>

var db = firebase.firestore();


// ADD SECTION

function addSection(){

let name = prompt("Enter Section Name");

if(!name) return;

db.collection("sections").add({
name:name
});

alert("Section Added");

}


// ADD CLASS

function addClass(){

let section = prompt("Enter Section Name");

let className = prompt("Enter Class Name");

if(!section || !className) return;

db.collection("classes").add({
section:section,
name:className
});

alert("Class Added");

}


// ADD SUBJECT

function addSubject(){

let section = prompt("Enter Section Name");

let className = prompt("Enter Class Name");

let subject = prompt("Enter Subject Name");

if(!section || !className || !subject) return;

db.collection("subjects").add({
section:section,
class:className,
name:subject
});

alert("Subject Added");

}


// ADD CHAPTER

function addChapter(){

let section = prompt("Enter Section Name");

let className = prompt("Enter Class Name");

let subject = prompt("Enter Subject Name");

let chapter = prompt("Enter Chapter Name");

if(!section || !className || !subject || !chapter) return;

db.collection("chapters").add({
section:section,
class:className,
subject:subject,
name:chapter
});

alert("Chapter Added");

}

</script>

</body>

</html>
