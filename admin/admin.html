<!DOCTYPE html>
<html>

<head>

<title>StudyBooks Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../firebase.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#4CAF50;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
font-size:18px;
}

.card:hover{
background:#f0f0f0;
}

</style>

</head>

<body>

<div class="header">
StudyBooks Admin Panel
</div>

<div class="container">

<div class="card" onclick="addSection()">
➕ Add Section
</div>

<div class="card" onclick="addClass()">
📚 Add Class
</div>

<div class="card" onclick="addSubject()">
📖 Add Subject
</div>

<div class="card" onclick="addChapter()">
📄 Add Chapter
</div>

</div>


<script>

var db = firebase.firestore();


function addSection(){

let name = prompt("Enter Section Name");

if(!name) return;

db.collection("sections").add({
name:name
});

alert("Section Added");

}


async function addClass(){

const snap = await db.collection("sections").get();

let sections=[];

snap.forEach(doc=>{
sections.push({
id:doc.id,
name:doc.data().name
});
});

let list = sections.map((s,i)=>`${i+1}. ${s.name}`).join("\n");

let index = prompt("Select Section:\n"+list);

if(!index) return;

let section = sections[index-1];

let className = prompt("Enter Class Name");

if(!className) return;

db.collection("sections")
.doc(section.id)
.collection("classes")
.add({
name:className
});

alert("Class Added");

}


async function addSubject(){

const sectionSnap = await db.collection("sections").get();

let sections=[];

sectionSnap.forEach(doc=>{
sections.push({id:doc.id,name:doc.data().name});
});

let sList = sections.map((s,i)=>`${i+1}. ${s.name}`).join("\n");

let sIndex = prompt("Select Section:\n"+sList);

let section = sections[sIndex-1];

const classSnap = await db.collection("sections")
.doc(section.id)
.collection("classes")
.get();

let classes=[];

classSnap.forEach(doc=>{
classes.push({id:doc.id,name:doc.data().name});
});

let cList = classes.map((c,i)=>`${i+1}. ${c.name}`).join("\n");

let cIndex = prompt("Select Class:\n"+cList);

let classObj = classes[cIndex-1];

let subjectName = prompt("Enter Subject Name");

if(!subjectName) return;

db.collection("sections")
.doc(section.id)
.collection("classes")
.doc(classObj.id)
.collection("subjects")
.add({
name:subjectName
});

alert("Subject Added");

}


async function addChapter(){

const sectionSnap = await db.collection("sections").get();

let sections=[];

sectionSnap.forEach(doc=>{
sections.push({id:doc.id,name:doc.data().name});
});

let sList = sections.map((s,i)=>`${i+1}. ${s.name}`).join("\n");

let sIndex = prompt("Select Section:\n"+sList);

let section = sections[sIndex-1];


const classSnap = await db.collection("sections")
.doc(section.id)
.collection("classes")
.get();

let classes=[];

classSnap.forEach(doc=>{
classes.push({id:doc.id,name:doc.data().name});
});

let cList = classes.map((c,i)=>`${i+1}. ${c.name}`).join("\n");

let cIndex = prompt("Select Class:\n"+cList);

let classObj = classes[cIndex-1];


const subjectSnap = await db.collection("sections")
.doc(section.id)
.collection("classes")
.doc(classObj.id)
.collection("subjects")
.get();

let subjects=[];

subjectSnap.forEach(doc=>{
subjects.push({id:doc.id,name:doc.data().name});
});

let subList = subjects.map((s,i)=>`${i+1}. ${s.name}`).join("\n");

let subIndex = prompt("Select Subject:\n"+subList);

let subject = subjects[subIndex-1];

let chapterName = prompt("Enter Chapter Name");

if(!chapterName) return;

db.collection("sections")
.doc(section.id)
.collection("classes")
.doc(classObj.id)
.collection("subjects")
.doc(subject.id)
.collection("chapters")
.add({
name:chapterName
});

alert("Chapter Added");

}

</script>

</body>

</html>
