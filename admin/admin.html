<!DOCTYPE html>
<html>

<head>

<title>StudyBooks Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../firebase.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.header{
background:#4CAF50;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.formBox{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.close{
background:#f44336;
margin-top:8px;
}

</style>

</head>

<body>

<div class="header">
StudyBooks Admin Panel
</div>

<div class="container">

<div class="card" onclick="openSection()">➕ Add Section</div>

<div class="card" onclick="openClass()">📚 Add Class</div>

<div class="card" onclick="openSubject()">📖 Add Subject</div>

<div class="card" onclick="openChapter()">📄 Add Chapter</div>

<div class="card" onclick="openManager()">
📂 Manage Content
</div>

</div>


<div class="modal" id="modal">

<div class="formBox" id="formArea"></div>

</div>


<script>

var db = firebase.firestore();


/* -------- SECTION -------- */

async function addSection(){

let name=document.getElementById("sectionName").value;

if(!name){
alert("Enter section name");
return;
}

await db.collection("sections").add({
name:name
});

alert("Section Added");

loadSections();

}


async function loadSections(){

const snap=await db.collection("sections").get();

let html="";

snap.forEach(doc=>{

let data=doc.data();

html+=`

<div class="item">

${data.name}

<button onclick="deleteSection('${doc.id}')">
Delete
</button>

</div>

`;

});

document.getElementById("sectionList").innerHTML=html;

}


async function deleteSection(id){

if(!confirm("Delete Section?")) return;

await db.collection("sections").doc(id).delete();

alert("Section Deleted");

loadSections();

}



/* -------- CLASS -------- */

async function addClass(){

let section=document.getElementById("classSection").value;

let name=document.getElementById("className").value;

if(!section || !name){
alert("Fill all fields");
return;
}

await db.collection("classes").add({
section:section,
name:name
});

alert("Class Added");

}



async function deleteClass(id){

if(!confirm("Delete Class?")) return;

await db.collection("classes").doc(id).delete();

alert("Class Deleted");

}



/* -------- SUBJECT -------- */

async function addSubject(){

let section=document.getElementById("subjectSection").value;

let className=document.getElementById("subjectClass").value;

let name=document.getElementById("subjectName").value;

if(!section || !className || !name){
alert("Fill all fields");
return;
}

await db.collection("subjects").add({
section:section,
class:className,
name:name
});

alert("Subject Added");

}



async function deleteSubject(id){

if(!confirm("Delete Subject?")) return;

await db.collection("subjects").doc(id).delete();

alert("Subject Deleted");

}



/* -------- CHAPTER -------- */

async function addChapter(){

let section=document.getElementById("chapterSection").value;

let className=document.getElementById("chapterClass").value;

let subject=document.getElementById("chapterSubject").value;

let name=document.getElementById("chapterName").value;

if(!section || !className || !subject || !name){
alert("Fill all fields");
return;
}

await db.collection("chapters").add({
section:section,
class:className,
subject:subject,
name:name
});

alert("Chapter Added");

}



async function deleteChapter(id){

if(!confirm("Delete Chapter?")) return;

await db.collection("chapters").doc(id).delete();

alert("Chapter Deleted");

}

async function openManager(){

const snap = await db.collection("sections").get();

let html = "<h3>Sections</h3>";

snap.forEach(doc=>{

const data = doc.data();

html += `
<div class="item">

<b>${data.name}</b>

<button onclick="openClasses('${data.name}')">
Open
</button>

<button onclick="deleteSection('${doc.id}')">
Delete
</button>

</div>
`;

});

document.getElementById("content").innerHTML = html;

}

async function openClasses(section){

const snap = await db.collection("classes")
.where("section","==",section)
.get();

let html = `<h3>${section} Classes</h3>`;

snap.forEach(doc=>{

const data = doc.data();

html += `
<div class="item">

${data.name}

<button onclick="openSubjects('${section}','${data.name}')">
Open
</button>

<button onclick="deleteClass('${doc.id}')">
Delete
</button>

</div>
`;

});

document.getElementById("content").innerHTML = html;

}

async function openSubjects(section,className){

const snap = await db.collection("subjects")
.where("section","==",section)
.where("class","==",className)
.get();

let html = `<h3>${className} Subjects</h3>`;

snap.forEach(doc=>{

const data = doc.data();

html += `
<div class="item">

${data.name}

<button onclick="openChapters('${section}','${className}','${data.name}')">
Open
</button>

<button onclick="deleteSubject('${doc.id}')">
Delete
</button>

</div>
`;

});

document.getElementById("content").innerHTML = html;

}

async function openChapters(section,className,subject){

const snap = await db.collection("chapters")
.where("section","==",section)
.where("class","==",className)
.where("subject","==",subject)
.get();

let html = `<h3>${subject} Chapters</h3>`;

snap.forEach(doc=>{

const data = doc.data();

html += `
<div class="item">

${data.name}

<button onclick="deleteChapter('${doc.id}')">
Delete
</button>

</div>
`;

});

document.getElementById("content").innerHTML = html;

}

async function deleteSection(id){

if(!confirm("Delete section?")) return;

await db.collection("sections").doc(id).delete();

alert("Deleted");

openManager();

}


async function deleteClass(id){

if(!confirm("Delete class?")) return;

await db.collection("classes").doc(id).delete();

alert("Deleted");

openManager();

}


async function deleteSubject(id){

if(!confirm("Delete subject?")) return;

await db.collection("subjects").doc(id).delete();

alert("Deleted");

openManager();

}


async function deleteChapter(id){

if(!confirm("Delete chapter?")) return;

await db.collection("chapters").doc(id).delete();

alert("Deleted");

}


</script>

</body>

</html>
