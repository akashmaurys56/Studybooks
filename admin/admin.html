<!DOCTYPE html>
<html>

<head>

<title>StudyBooks Admin</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="../firebase.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
}

.header{
background:#4CAF50;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.formBox{
background:white;
padding:25px;
border-radius:10px;
width:300px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.close{
background:#f44336;
margin-top:8px;
}

</style>

</head>

<body>

<div class="header">
StudyBooks Admin Panel
</div>

<div class="container">

<div class="card" onclick="openSection()">➕ Add Section</div>

<div class="card" onclick="openClass()">📚 Add Class</div>

<div class="card" onclick="openSubject()">📖 Add Subject</div>

<div class="card" onclick="openChapter()">📄 Add Chapter</div>

</div>


<div class="modal" id="modal">

<div class="formBox" id="formArea"></div>

</div>


<script>

var db = firebase.firestore();

function closeForm(){

document.getElementById("modal").style.display="none";

}


function openSection(){

document.getElementById("modal").style.display="flex";

document.getElementById("formArea").innerHTML=`

<h3>Add Section</h3>

<input id="sectionName" placeholder="Section Name">

<button onclick="addSection()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

}


function addSection(){

let name=document.getElementById("sectionName").value;

if(!name) return alert("Enter section");

db.collection("sections").add({

name:name

});

alert("Section Added");

closeForm();

}



async function loadSections(selectId){

const snap=await db.collection("sections").get();

let html=`<option value="">Select Section</option>`;

snap.forEach(doc=>{

html+=`<option value="${doc.data().name}">${doc.data().name}</option>`;

});

document.getElementById(selectId).innerHTML=html;

}


async function loadClasses(section,selectId){

const snap=await db.collection("classes")
.where("section","==",section)
.get();

let html=`<option value="">Select Class</option>`;

snap.forEach(doc=>{

html+=`<option value="${doc.data().name}">${doc.data().name}</option>`;

});

document.getElementById(selectId).innerHTML=html;

}


async function loadSubjects(section,className,selectId){

const snap=await db.collection("subjects")
.where("section","==",section)
.where("class","==",className)
.get();

let html=`<option value="">Select Subject</option>`;

snap.forEach(doc=>{

html+=`<option value="${doc.data().name}">${doc.data().name}</option>`;

});

document.getElementById(selectId).innerHTML=html;

}



function openClass(){

document.getElementById("modal").style.display="flex";

document.getElementById("formArea").innerHTML=`

<h3>Add Class</h3>

<select id="classSection"></select>

<input id="className" placeholder="Class Name">

<button onclick="addClass()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

loadSections("classSection");

}


function addClass(){

let section=document.getElementById("classSection").value;

let name=document.getElementById("className").value;

if(!section || !name) return alert("Fill fields");

db.collection("classes").add({

section:section,

name:name

});

alert("Class Added");

closeForm();

}



function openSubject(){

document.getElementById("modal").style.display="flex";

document.getElementById("formArea").innerHTML=`

<h3>Add Subject</h3>

<select id="subjectSection"
onchange="loadClasses(this.value,'subjectClass')"></select>

<select id="subjectClass"></select>

<input id="subjectName" placeholder="Subject Name">

<button onclick="addSubject()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

loadSections("subjectSection");

}


function addSubject(){

let section=document.getElementById("subjectSection").value;

let className=document.getElementById("subjectClass").value;

let name=document.getElementById("subjectName").value;

if(!section || !className || !name) return alert("Fill fields");

db.collection("subjects").add({

section:section,

class:className,

name:name

});

alert("Subject Added");

closeForm();

}



function openChapter(){

document.getElementById("modal").style.display="flex";

document.getElementById("formArea").innerHTML=`

<h3>Add Chapter</h3>

<select id="chapterSection"
onchange="loadClasses(this.value,'chapterClass')"></select>

<select id="chapterClass"
onchange="loadSubjects(
document.getElementById('chapterSection').value,
this.value,
'chapterSubject'
)"></select>

<select id="chapterSubject"></select>

<input id="chapterName" placeholder="Chapter Name">

<button onclick="addChapter()">Save</button>

<button class="close" onclick="closeForm()">Cancel</button>

`;

loadSections("chapterSection");

}


function addChapter(){

let section=document.getElementById("chapterSection").value;

let className=document.getElementById("chapterClass").value;

let subject=document.getElementById("chapterSubject").value;

let chapter=document.getElementById("chapterName").value;

if(!section || !className || !subject || !chapter){

alert("Fill fields");

return;

}

db.collection("chapters").add({

section:section,

class:className,

subject:subject,

name:chapter

});

alert("Chapter Added");

closeForm();

}

</script>

</body>

</html>
