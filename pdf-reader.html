<!DOCTYPE html>
<html>

<head>
<title>PDF Reader</title>

<style>

body{
margin:0;
background:#000;
}

iframe{
width:100%;
height:100vh;
border:none;
}

</style>

</head>

<body>

<iframe id="viewer"></iframe>

<script>

let params = new URLSearchParams(window.location.search);
let file = params.get("file");

document.getElementById("viewer").src = file;

</script>

</body>

</html>
